workflows:
  flutter-android-release:
    name: Flutter Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Clean and Fetch Packages
        script: |
          flutter clean
          flutter packages pub get
      - name: Inject Missing Gradle Jar Automatically
        script: |
          cd android
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.6.3/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
      - name: Build Android APK Official
        script: |
          # Perintah standar release murni tanpa flag aneh-aneh
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

workflows:
  flutter-android-release:
    name: Flutter Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Clean and Fetch Packages
        script: |
          flutter clean
          flutter packages pub get
      - name: Inject Missing Gradle Jar Automatically
        script: |
          cd android
          # 1. Bikin foldernya secara paksa jika belum ada
          mkdir -p gradle/wrapper
          
          # 2. Tembak langsung download file biner gradle-wrapper.jar asli dari server Gradle resmi
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar
          
          # 3. Amankan izin eksekusi skrip gradlew
          chmod +x gradlew
      - name: Build Android APK via Pure Gradle
        script: |
          cd android
          # Jalankan kompilasi native Android untuk bypass sensor v1 embedding milik Flutter CLI
          ./gradlew assembleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

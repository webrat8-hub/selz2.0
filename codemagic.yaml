workflows:
  flutter-android-release:
    name: Flutter Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Clean and Fetch Packages
        script: |
          flutter clean
          flutter packages pub get
      - name: Wipe and Regenerate Gradle Wrapper
        script: |
          cd android
          # Hapus total file skrip gradlew teks lama yang bikin ganjalan eror
          rm -f gradlew
          rm -f gradlew.bat
          rm -rf gradle/wrapper
          # Paksa Flutter SDK di server untuk nge-generate ulang struktur Gradle murni bawaan mereka
          flutter build apk --config-only
      - name: Build Android APK
        script: |
          # Rakit APK secara resmi dengan bypass total sisa-sisa cache v1
          flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

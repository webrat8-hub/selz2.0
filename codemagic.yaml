workflows:
  flutter-android-release:
    name: Flutter Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Hard Clean Project Cache
        script: |
          # Memaksa server menghapus sisa-sisa cache build v1 lama
          flutter clean
          rm -rf android/.gradle
          rm -f pubspec.lock
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          # Melakukan build release sambil memaksa bypass pengecekan v1 embedding
          flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

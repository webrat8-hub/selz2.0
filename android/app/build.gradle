plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.selz_monitor"
    compileSdkVersion 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.selz_monitor"
        minSdkVersion 21
        targetSdkVersion 34
        // Kita hardcode version-nya biar gak nyari file lokal dan gak bikin 'null'
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source rootProject.file('..')
}

dependencies {
    // KOSONGKAN BLOK INI! 
    // Di Flutter versi terbaru, semua plugin dan library Kotlin otomatis disuntik ke sini.
    // Gak boleh ada kode $kotlin_version lagi yang bikin sistem crash jadi 'null'.
}

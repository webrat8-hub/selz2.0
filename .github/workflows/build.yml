name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Permissions and Setup Properties
        run: |
          # 1. Bantai settings.gradle LIAR yang ada di luar folder android (Root)
          if [ -f settings.gradle ]; then
            rm -f settings.gradle
          fi
          if [ -f settings.gradle.kts ]; then
            rm -f settings.gradle.kts
          fi

          cd android
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          
          # 2. Hapus argumen MaxPermSize di properti android
          if [ -f gradle.properties ]; then
            sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties
          fi

          # 3. Potong jalur modul :gradle di file android/settings.gradle yang asli
          if [ -f settings.gradle ]; then
            sed -i "/include ':gradle'/d" settings.gradle
            sed -i "/include 'gradle'/d" settings.gradle
          fi

          # 4. Hapus total folder gradle lama di dalam android/
          rm -rf gradle

          # 5. Bangun ulang folder wrapper resmi dari nol
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.6.3/gradle/wrapper/gradle-wrapper.jar
          
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.3-all.zip" >> gradle/wrapper/gradle-wrapper.properties
          
          chmod +x gradlew

      - name: Clean and Fetch Packages
        run: |
          flutter clean
          flutter pub get

      - name: Build APK Release via Pure Gradle
        run: |
          cd android
          # Pindah eksekusi langsung pake perintah spesifik modul app
          ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: android/app/build/outputs/apk/release/app-release.apk

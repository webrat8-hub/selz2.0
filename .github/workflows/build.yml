name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Create and Run Ultimate V2 Migrator
        run: |
          # Menggunakan 'EOF' biar semua tanda kutip di dalam kode Python aman 100%
          cat << 'EOF' > migrator.py
          import os
          import re

          print("=== MEMULAI SCRIPT MIGRASI V2 EMBEDDING ===")

          # 1. Sikat semua AndroidManifest.xml di dalam repo
          manifest_found = False
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file == 'AndroidManifest.xml':
                      path = os.path.join(root, file)
                      print(f"Menemukan file Manifest: {path}")
                      manifest_found = True
                      
                      with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read()
                      
                      # Hapus tag embedding lama/rusak biar gak duplikat
                      content = re.sub(r'<meta-data\s+android:name=["\']flutterEmbedding["\'][^>]*>', '', content)
                      
                      # Ganti nama aplikasi V1 purba
                      content = content.replace('io.flutter.app.FlutterApplication', '${applicationName}')
                      
                      # Suntik paksa tag V2 tepat sebelum tag penutup </application>
                      content = re.sub(r'(?i)</application\s*>', '        <meta-data android:name="flutterEmbedding" android:value="2" />\n    </application>', content)
                      
                      with open(path, 'w', encoding='utf-8') as f:
                          f.write(content)
                      print(f"-> BERHASIL MEMAKSA V2 PADA: {path}")

          if not manifest_found:
              print("PERINGATAN: AndroidManifest.xml sama sekali tidak ditemukan!")

          # 2. Sikat semua MainActivity & Application class (Java / Kotlin)
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith('.kt') or file.endswith('.java'):
                      path = os.path.join(root, file)
                      
                      with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read()
                      
                      modified = False
                      if 'io.flutter.app.FlutterActivity' in content:
                          content = content.replace('io.flutter.app.FlutterActivity', 'io.flutter.embedding.android.FlutterActivity')
                          modified = True
                      if 'io.flutter.app.FlutterApplication' in content:
                          content = content.replace('io.flutter.app.FlutterApplication', 'android.app.Application')
                          modified = True
                      
                      if modified:
                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(content)
                          print(f"-> BERHASIL MIGRASI KODE SUMBER V2: {path}")

          print("=== SCRIPT MIGRASI SELESAI ===")
          EOF
          
          # Jalankan script mandiri yang udah dibuat
          python3 migrator.py

      - name: Fix Permissions and Setup Properties
        run: |
          cd android
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          
          if [ -f gradle.properties ]; then
            sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties
          fi

          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.6.3/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Clean and Fetch Packages
        run: |
          flutter clean
          flutter pub get

      - name: Build APK Release via Pure Gradle
        run: |
          cd android
          ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: android/app/build/outputs/apk/release/app-release.apk

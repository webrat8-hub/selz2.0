name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Permissions and Setup Properties
        run: |
          cd android
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          
          # 1. Hapus argumen MaxPermSize jadul
          if [ -f gradle.properties ]; then
            sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties
          fi

          # 2. POTONG JALUR SI KEPARAT :gradle DI SETTINGS.GRADLE
          if [ -f settings.gradle ]; then
            sed -i "/include ':gradle'/d" settings.gradle
            sed -i "/include 'gradle'/d" settings.gradle
          fi

          # 3. NUKLIR TOTAL: Hapus folder gradle lama beserta hantu file build didalamnya
          rm -rf gradle

          # 4. Bangun ulang folder wrapper yang 100% steril dan bersih
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.6.3/gradle/wrapper/gradle-wrapper.jar
          
          # Buat ulang file gradle-wrapper.properties standar biar gak nyari konfigurasi aneh
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.3-all.zip" >> gradle/wrapper/gradle-wrapper.properties
          
          chmod +x gradlew

      - name: Clean and Fetch Packages
        run: |
          flutter clean
          flutter pub get

      - name: Build APK Release via Pure Gradle
        run: |
          cd android
          ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: android/app/build/outputs/apk/release/app-release.apk

name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Permissions and Setup Properties
        run: |
          cd android
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          
          # 1. Hapus argumen MaxPermSize jika ada
          if [ -f gradle.properties ]; then
            sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties
          fi

          # 2. BERSIHKAN PENYUSUP: Hapus file build.gradle/kts liar di dalam folder gradle yang bikin eror :gradle:compileKotlin
          find gradle/ -maxdepth 1 -type f -name "build.gradle*" -delete
          
          # 3. Download ulang wrapper yang bersih dan resmi
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.6.3/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Clean and Fetch Packages
        run: |
          flutter clean
          flutter pub get

      - name: Build APK Release via Pure Gradle
        run: |
          cd android
          # Memaksa build HANYA untuk modul aplikasi utama (:app) dan abaikan modul liar
          ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: android/app/build/outputs/apk/release/app-release.apk

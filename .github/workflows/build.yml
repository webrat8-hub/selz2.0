name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. SET UP JAVA 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. SET UP FLUTTER
      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # 3. SAKLAR SAPU BERSIH (Hapus cache lokal & Suntik SDK Path)
      - name: Clean Local Junk and Fix Properties
        run: |
          # Hapus file konfigurasi bawaan PC/HP yang tidak sengaja ke-commit
          rm -f .flutter-plugins .flutter-plugins-dependencies
          rm -f android/local.properties
          
          # Buat ulang local.properties yang bersih khusus untuk server GitHub
          cd android
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          
          # Bersihkan sisa MaxPermSize di gradle.properties jika ada
          if [ -f gradle.properties ]; then
            sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties
            sed -i 's/MaxPermSize=512m//g' gradle.properties
            echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          fi

      # 4. AMBIL DEPENDENCIES FRESH/SEGAR
      - name: Clean and Fetch Packages
        run: |
          flutter clean
          flutter pub get

      # 5. BUILD APK RELEASE
      - name: Build APK Release via Flutter CLI
        run: |
          flutter build apk --release

      # 6. UPLOAD HASIL APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: build/app/outputs/flutter-apk/app-release.apk

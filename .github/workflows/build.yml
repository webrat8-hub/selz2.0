name: Build Flutter Android APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Prepare and Build
        run: |
          # 1. Bersihkan sisa-sisa path lokal
          rm -f android/local.properties
          
          # 2. Buat konfigurasi SDK agar Gradle tahu lokasi Flutter
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # 3. Bersihkan cache agar tidak ada konflik dependensi lama
          flutter clean
          flutter pub get
          
          # 4. Jalankan perintah build APK
          flutter build apk --release

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # STRATEGI PINTAS: Hapus semua file *generated* biar Flutter bikin ulang dari awal
      - name: Force Rebuild Dependencies
        run: |
          # Hapus file sampah yang bikin 'Value is null'
          rm -rf android/.gradle
          rm -f android/app/build/
          rm -f .flutter-plugins .flutter-plugins-dependencies
          
          # Paksa Flutter buat bikin ulang konfigurasi plugin
          flutter pub get
          flutter clean

      - name: Build APK Release
        run: |
          # Kita pakai flag --no-shrink biar gak bentrok sama konfigurasi minification
          flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: build/app/outputs/flutter-apk/app-release.apk

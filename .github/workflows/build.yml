name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. UPGRADE KE JAVA 17 (Biar sinkron sama build.gradle lo)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # 2. AMBIL DEPENDENCIES
      - name: Clean and Fetch Packages
        run: |
          flutter clean
          flutter pub get

      # 3. BUILD PAKAI PERINTAH RESMI FLUTTER (Biar semua plugin otomatis terbaca)
      - name: Build APK Release via Flutter CLI
        run: |
          flutter build apk --release

      # 4. UPLOAD HASIL APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Ultimate Auto Migrate to Embedding V2 via Regex Python
        run: |
          python3 -c "
          import os, re

          # 1. Scan dan Paksa Ubah Semua AndroidManifest.xml ke V2
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file == 'AndroidManifest.xml' and 'profile' not in root and 'debug' not in root:
                      path = os.path.join(root, file)
                      print(f'Membedah Manifest: {path}')
                      with open(path, 'r') as f:
                          content = f.read()
                      
                      # Hapus total nama application V1 jadul jika ada
                      content = content.replace('io.flutter.app.FlutterApplication', '\${applicationName}')
                      
                      # Suntik Meta-data V2 menggunakan Regex anti-gagal (kebal spasi / baris baru)
                      if 'flutterEmbedding' not in content:
                          content = re.sub(r'(?i)</application\s*>', '        <meta-data android:name=\"flutterEmbedding\" android:value=\"2\" />\n    </application>', content)
                          print(f'-> BERHASIL SUNTIK V2 EMBEDDING KE: {path}')
                      
                      with open(path, 'w') as f:
                          f.write(content)

          # 2. Scan dan Paksa Ubah Semua MainActivity (Java / Kotlin) ke V2
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file in ['MainActivity.kt', 'MainActivity.java']:
                      path = os.path.join(root, file)
                      print(f'Membedah Activity: {path}')
                      with open(path, 'r') as f:
                          content = f.read()
                      
                      # Ganti paksa import Activity V1 ke V2 modern
                      content = content.replace('io.flutter.app.FlutterActivity', 'io.flutter.embedding.android.FlutterActivity')
                      
                      with open(path, 'w') as f:
                          f.write(content)
                      print(f'-> BERHASIL MIGRASI ACTIVITY: {path}')
          "

      - name: Fix Permissions and Setup Properties
        run: |
          cd android
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          
          if [ -f gradle.properties ]; then
            sed -i 's/-XX:MaxPermSize=512m//g' gradle.properties
          fi

          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.6.3/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Clean and Fetch Packages
        run: |
          flutter clean
          flutter pub get

      - name: Build APK Release via Pure Gradle
        run: |
          cd android
          ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: android/app/build/outputs/apk/release/app-release.apk

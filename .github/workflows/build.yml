name: Build Flutter Android APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Fix Local Properties and Build
        run: |
          # 1. Bersihkan sisa-sisa build lama agar tidak ada path korup
          rm -f android/local.properties
          rm -f .flutter-plugins .flutter-plugins-dependencies
          
          # 2. Buat ulang local.properties dengan path SDK yang benar dari env
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # 3. Bersihkan gradle cache biar fresh
          cd android
          chmod +x gradlew
          ./gradlew clean
          cd ..
          
          # 4. Fetch dependencies
          flutter clean
          flutter pub get

      - name: Build APK Release
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: build/app/outputs/flutter-apk/app-release.apk

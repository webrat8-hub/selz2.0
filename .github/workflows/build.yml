name: Build Flutter Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Build APK
        run: |
          # 1. Pastikan path SDK tersambung
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # 2. Bersihkan total untuk menghindari konflik cache
          flutter clean
          flutter pub get
          
          # 3. Build dengan mode release tanpa daemon (lebih stabil di CI)
          flutter build apk --release --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: selz-monitor-apk
          path: build/app/outputs/flutter-apk/app-release.apk
